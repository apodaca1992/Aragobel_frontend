<ion-menu side="start" menuId="MenuPrincipal" contentId="principal">
  <div class="menu-header-bg">
    <h2>Aragobel</h2>
    <p style="color: rgba(255,255,255,0.8); margin: 4px 0 0 0; font-size: 13px;">
      v1.0.0 - Sistema de Gestión
    </p>
  </div>

  <ion-list-header style="margin-top: 20px;">
      <ion-label color="medium" style="font-size: 12px; font-weight: 600; letter-spacing: 0.5px;">OPERACIÓN</ion-label>
    </ion-list-header>

  <ion-content>
    <div style="margin-top: 10px;">
      <ng-container *ngFor="let p of appPages | async">
        <ion-menu-toggle auto-hide="false" *ngIf="p.section === 'OPERACION'">
          <ion-item
            routerDirection="root"
            [routerLink]="[p.redirectTo]"
            routerLinkActive="selected"
            lines="none"
            detail="false"
            button>
            <ion-icon slot="start" [name]="p.icon"></ion-icon>        
            <ion-label>{{ p.name }}</ion-label>
          </ion-item>    
        </ion-menu-toggle>
      </ng-container>
    </div>

    <ion-list-header style="margin-top: 20px;" *ngIf="isAdmin">
      <ion-label color="medium" style="font-size: 12px;">ADMINISTRACIÓN</ion-label>
    </ion-list-header>

    <ng-container *ngFor="let p of appPages | async">
      <ion-menu-toggle auto-hide="false" *ngIf="p.section === 'ADMINISTRACION'">
        <ion-item [routerLink]="[p.redirectTo]" routerDirection="root" routerLinkActive="selected" lines="none" detail="false" button>
          <ion-icon slot="start" [name]="p.icon"></ion-icon>        
          <ion-label>{{ p.name }}</ion-label>
        </ion-item>    
      </ion-menu-toggle>
    </ng-container>

    <ion-list-header style="margin-top: 20px;">
      <ion-label color="medium" style="font-size: 12px; font-weight: 600; letter-spacing: 0.5px;">CUENTA</ion-label>
    </ion-list-header>

    <div style="margin-top: 5px;">
      <ng-container *ngFor="let p of appPages | async">
        <ion-menu-toggle auto-hide="false" *ngIf="p.section === 'CUENTA'">
          <ion-item
            routerDirection="root"
            [routerLink]="[p.redirectTo]"
            routerLinkActive="selected"
            lines="none"
            detail="false"
            button>
            <ion-icon slot="start" [name]="p.icon"></ion-icon>        
            <ion-label>{{ p.name }}</ion-label>
          </ion-item>    
        </ion-menu-toggle>
      </ng-container>

      <ion-item (click)="cerrarSesion()" button detail="false" class="logout-item" lines="none"> 
        <ion-icon slot="start" name="log-out-outline" color="danger"></ion-icon>   
        <ion-label color="danger">Cerrar Sesión</ion-label>
      </ion-item>
    </div>
  </ion-content>
</ion-menu>
