<app-header [titulo]="entrega.id ? 'Editar Entrega' : 'Nueva Entrega'" mode="back"></app-header>

<ion-content class="ion-padding" color="light">
  <div class="flex-start">
    <ion-card mode="ios" class="form-card">
      <ion-card-content>
        
        <div class="section-title">Información de Entrega</div>
        
        <div class="input-group">
          <ion-item lines="none" class="custom-item">
            <ion-icon slot="start" name="document-text-outline" color="primary"></ion-icon>
            <ion-input type="number" label="Folio" labelPlacement="floating" [(ngModel)]="entrega.folio" placeholder=""></ion-input>
          </ion-item>

          <ion-item lines="none" class="custom-item">
            <ion-icon slot="start" name="person-outline" color="primary"></ion-icon>
            <ion-input label="Persona que recibe" labelPlacement="floating" [(ngModel)]="entrega.persona_recibe"></ion-input>
          </ion-item>

          <ion-item lines="none" class="custom-item" id="open-colonia-modal" button="true" detail="false">
            <ion-icon slot="start" name="map-outline" color="primary"></ion-icon>
            
            <div class="input-floating-mock">
              <span class="mock-label">Colonia</span>
              <span [class.is-placeholder]="!entrega.colonia" class="mock-value">
                {{ entrega.colonia || 'Selecciona una colonia...' }}
              </span>
            </div>
            
            <ion-icon name="chevron-forward-outline" slot="end" color="medium" style="font-size: 14px; margin: 0;"></ion-icon>
          </ion-item>
        </div>        

        <div class="ion-padding-top">
          <ion-button expand="block" shape="round" class="main-button" (click)="guardar()">
            {{ entrega.id ? 'ACTUALIZAR' : 'CREAR ENTREGA' }}
          </ion-button>
        </div>

      </ion-card-content>
    </ion-card>
  </div>
</ion-content>

<ion-modal trigger="open-colonia-modal" #coloniaModal class="custom-search-modal">
  <ng-template>
    <ion-header class="ion-no-border">
      <ion-toolbar color="primary">
        <ion-title>Buscar Colonia</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="coloniaModal.dismiss()" style="font-weight: 700;">CERRAR</ion-button>
        </ion-buttons>
      </ion-toolbar>
      <ion-toolbar color="primary" style="padding: 0 4px 8px 4px;">
        <ion-searchbar 
          placeholder="Escribe el nombre de la colonia..." 
          (ionInput)="filtrarColonias($event)"
          [debounce]="250"
          animated="true">
        </ion-searchbar>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding">
      <ion-list lines="filteredColonias.length > 0 ? 'inset' : 'none'">
        <ion-item 
          *ngFor="let col of filteredColonias" 
          button="true" 
          detail="false"
          (click)="seleccionarColonia(col, coloniaModal)">
          <ion-icon name="location-outline" slot="start" color="medium"></ion-icon>
          <ion-label>
            <h2>{{ col.nombre }}</h2>
            <p *ngIf="col.cp">Código Postal: {{ col.cp }}</p>
          </ion-label>
        </ion-item>

        <div class="no-results" *ngIf="filteredColonias.length === 0" style="text-align: center; padding: 40px 20px; color: #a0aec0;">
          <ion-icon name="search-outline" style="font-size: 48px; margin-bottom: 8px;"></ion-icon>
          <p>No se encontraron colonias que coincidan.</p>
        </div>
      </ion-list>
    </ion-content>
  </ng-template>
</ion-modal>
