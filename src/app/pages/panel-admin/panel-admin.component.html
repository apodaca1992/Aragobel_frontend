<app-header titulo="Gestión" mode="menu"></app-header>

<ion-content class="ion-padding gray-bg">
  
  <div class="welcome-header compact">
    <h2>Panel de Control</h2>
    <p>Configuración del sistema</p>
  </div>

  <div *ngFor="let seccion of sections">
    <div class="section-title">{{ seccion.nombre }}</div>
    
    <ion-grid>
      <ion-row>
        <ion-col [size]="seccion.nombre === 'Reportes y Resultados' ? '12' : '6'" 
                 *ngFor="let opt of seccion.opciones">
          
          <ion-card class="admin-card" [routerLink]="opt.route" button="true" *ngIf="seccion.nombre !== 'Reportes y Resultados'">
            <ion-card-content>
              <div class="icon-box" [ngClass]="opt.class">
                <ion-icon [name]="opt.icon"></ion-icon>
              </div>
              <ion-label>{{ opt.title }}</ion-label>
            </ion-card-content>
          </ion-card>

          <div class="report-item" [routerLink]="opt.route" *ngIf="seccion.nombre === 'Reportes y Resultados'">
            <div class="icon-box-small" [ngClass]="opt.class">
              <ion-icon [name]="opt.icon"></ion-icon>
            </div>
            <div class="report-info">
              <ion-label class="report-title">{{ opt.title }}</ion-label>
              <ion-note>Consultar histórico y exportar datos</ion-note>
            </div>
            <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
          </div>

        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

</ion-content>
