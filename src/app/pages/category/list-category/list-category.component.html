<app-header titulo="Listado Category" mode="menu"></app-header>   
<ion-content>
  
  <ion-grid>
    <ion-row>
      <ion-col size="10">
        <ion-input         
        label="Name" 
        labelPlacement="stacked"         
        [(ngModel)]="newCategoryName"
        placeholder="Name"></ion-input>
      </ion-col>
      <ion-col size="2">
        <ion-button 
        (click)="createCategory()">
          <ion-icon name="add" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-col>
    </ion-row>
  </ion-grid>

  <ion-item *ngFor="let category of categories()">
    <ion-checkbox
    aria-label="Label"
    slot="start"
    [(ngModel)]="category.active"
    (ionChange)="updateCategory(category)"
    ></ion-checkbox>
    <ion-label>{{ category.name}}</ion-label>
    <ion-button
      slot="end"
      (click)="deleteCategory(category)"
      fill="clear"
      color="danger">
      <ion-icon name="trash" slot="icon-only"></ion-icon>
    </ion-button>
  </ion-item>

  <br>
  <br><br><br><br><br><br>

  <ion-button routerLink="/category/add" expand="full">
    Ir a Categorías
  </ion-button>
</ion-content>
